plugins {
    id 'com.android.application'
}

android {
    namespace 'com.proxy'
    compileSdk 34

    defaultConfig {
        applicationId "com.proxy.superproxy"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}
include ':app'
rootProject.name = "Proxy1"
